# Build a one-file Windows .exe with PyInstaller and attach it to the GitHub Release for the pushed tag.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --extra build

      - name: Run tests
        run: uv run pytest

      - name: Build executable (PyInstaller)
        run: uv run pyinstaller packaging/try-working-hard.spec

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/try-working-hard.exe
          generate_release_notes: true
