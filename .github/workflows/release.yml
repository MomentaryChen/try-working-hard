# Build a one-file Windows .exe with PyInstaller and attach it to the GitHub Release for the pushed tag.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv sync --group dev --extra build

      - name: Run tests
        run: uv run pytest

      - name: Build executable (PyInstaller)
        run: uv run pyinstaller packaging/try-working-hard.spec

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith("v")) {
            throw "Expected a v-prefixed tag, got: $tag"
          }
          $version = $tag.Substring(1)
          if (-not (Test-Path "dist/try-working-hard.exe")) {
            throw "Built executable not found at dist/try-working-hard.exe"
          }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" "packaging/try-working-hard.iss"
          $setupPath = "dist/try-working-hard-setup-$tag.exe"
          if (-not (Test-Path $setupPath)) {
            throw "Built installer not found at $setupPath"
          }

      - name: Rename release asset with tag version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith("v")) {
            throw "Expected a v-prefixed tag, got: $tag"
          }
          $src = "dist/try-working-hard.exe"
          if (-not (Test-Path $src)) {
            throw "Built executable not found at $src"
          }
          $dst = "dist/try-working-hard-$tag.exe"
          Move-Item -Path $src -Destination $dst -Force

      - name: Generate SHA256 checksum file
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith("v")) {
            throw "Expected a v-prefixed tag, got: $tag"
          }
          $assetName = "try-working-hard-$tag.exe"
          $assetPath = "dist/$assetName"
          if (-not (Test-Path $assetPath)) {
            throw "Built executable not found at $assetPath"
          }
          $setupPath = "dist/try-working-hard-setup-$tag.exe"
          if (-not (Test-Path $setupPath)) {
            throw "Built installer not found at $setupPath"
          }
          $exeHash = (Get-FileHash -Path $assetPath -Algorithm SHA256).Hash.ToLower()
          $setupHash = (Get-FileHash -Path $setupPath -Algorithm SHA256).Hash.ToLower()
          $checksumPath = "dist/try-working-hard-$tag-checksums.txt"
          @(
            "$exeHash  $assetName"
            "$setupHash  try-working-hard-setup-$tag.exe"
          ) | Set-Content -Path $checksumPath -Encoding utf8

      - name: Build release notes from CHANGELOG
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith("v")) {
            throw "Expected a v-prefixed tag, got: $tag"
          }
          $version = $tag.Substring(1)

          $changelogPath = "CHANGELOG.md"
          if (-not (Test-Path $changelogPath)) {
            throw "CHANGELOG.md not found."
          }

          $content = Get-Content $changelogPath -Raw
          $escapedVersion = [regex]::Escape($version)
          $sectionPattern = "(?ms)^## \[$escapedVersion\].*?(?=^## \[|\z)"
          $match = [regex]::Match($content, $sectionPattern)

          if (-not $match.Success) {
            throw "No CHANGELOG section found for version $version."
          }

          $section = $match.Value.Trim()
          $body = @"
          ## Release $tag

          $section

          ## Assets
          - `dist/try-working-hard-$tag.exe`
          - `dist/try-working-hard-setup-$tag.exe`
          - `dist/try-working-hard-$tag-checksums.txt`
          "@

          Set-Content -Path release-notes.md -Value $body -Encoding utf8

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/try-working-hard-${{ github.ref_name }}.exe
            dist/try-working-hard-setup-${{ github.ref_name }}.exe
            dist/try-working-hard-${{ github.ref_name }}-checksums.txt
          body_path: release-notes.md
