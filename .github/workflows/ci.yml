name: CI

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
      - "dev/**"
      - "feature/**"
      - "fix/**"

permissions:
  contents: read

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest
